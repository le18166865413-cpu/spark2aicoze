  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const w = img.width || 200, h = img.height || 200;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23262626"/><text x="50%" y="50%" text-anchor="middle" font-size="14" fill="%23a3a3a3" font-family="system-ui" dominant-baseline="central">图片</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>

  <script>
    lucide.createIcons();

    // @mention 功能
    let mentionPanelVisible = false;
    
    function handlePromptInput(event) {
      const input = event.target;
      const value = input.value;
      const cursorPos = input.selectionStart;
      
      // 检测是否输入了 @
      const beforeCursor = value.substring(0, cursorPos);
      const lastAtIndex = beforeCursor.lastIndexOf('@');
      
      if (lastAtIndex !== -1 && cursorPos - lastAtIndex <= 20) {
        // 显示 mention 面板
        showMentionPanel();
        mentionPanelVisible = true;
      } else {
        hideMentionPanel();
        mentionPanelVisible = false;
      }
    }
    
    function showMentionPanel() {
      document.getElementById('mention-panel').classList.remove('hidden');
      lucide.createIcons();
    }
    
    function hideMentionPanel() {
      document.getElementById('mention-panel').classList.add('hidden');
    }
    
    function selectMention(type, name, content) {
      const input = document.getElementById('prompt-input');
      const value = input.value;
      const cursorPos = input.selectionStart;
      
      // 找到 @ 的位置并替换
      const beforeCursor = value.substring(0, cursorPos);
      const lastAtIndex = beforeCursor.lastIndexOf('@');
      
      if (type === 'text') {
        // 文字素材：直接插入内容到提示词
        const newValue = value.substring(0, lastAtIndex) + content + value.substring(cursorPos);
        input.value = newValue;
        
        // 添加引用标签
        addReferenceTag(name, 'text');
      } else if (type === 'image') {
        // 图片素材：添加到参考图区域
        addRefImageFromBrandKit(name);
        addReferenceTag(name, 'image');
      }
      
      hideMentionPanel();
      lucide.createIcons();
    }
    
    function filterMentions(event) {
      const keyword = event.target.value.toLowerCase();
      // 实际项目中需要动态过滤素材列表
      console.log('Filtering mentions:', keyword);
