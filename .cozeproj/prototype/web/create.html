<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #22C55E;
      --color-primary-container:    #22C55E;
      --color-on-primary:           #050f09;
      /* === 背景 / 表面 === */
      --color-background:                 #09090b;
      --color-surface-container-lowest:   #111113;
      --color-surface:                    #09090b;
      --color-surface-container:          #1c1c1f;
      --color-surface-container-high:     #27272a;
      --color-surface-container-highest:  #303033;
      /* === 文字 === */
      --color-on-surface:           #fafafa;
      --color-on-surface-variant:   #a1a1aa;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #27272a;
      --color-outline-variant:  #3f3f46;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.12);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.25);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.4);
      /* === 字体 === */
      --font-sans: "Inter", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @main-content:start -->
  <main class="min-h-screen flex flex-col">

    <!-- 顶部粘性导航栏 -->
    <header class="bg-background/80 backdrop-blur-md sticky top-0 z-50 w-full border-b border-outline-variant/20">
      <div class="max-w-[1800px] mx-auto flex h-14 items-center px-4 md:px-6">
        <!-- 左侧：返回按钮 + 分隔线 + 标题 -->
        <div class="flex items-center gap-3">
          <a href="home.html" id="btn-back" class="inline-flex items-center gap-1.5 text-sm font-medium text-on-surface-variant hover:text-primary transition-colors">
            <i data-lucide="undo-2" class="w-4 h-4"></i>
            <span>返回广场</span>
          </a>
          <div class="w-px h-5 bg-outline-variant/30"></div>

    <!-- 主内容区：左右两栏 -->

        <!-- ========== 左侧 - 输入面板 ========== -->

          <!-- a) 模式切换器 -->
          <div class="bg-surface-container rounded-xl p-1.5 inline-flex gap-1">

              <i data-lucide="sparkles" class="w-4 h-4"></i>
              文字生图
            </button>
            <button id="tab-ref2img" class="mode-tab inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-medium transition-all text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high" data-mode="ref2img">

          </div>

                <!-- 比例按钮-4:3横版 -->

                    <span class="text-sm font-semibold text-on-surface">Nano Banana Fast</span>

            </div>
          </div>

        </div>

        <!-- ========== 右侧 - 预览面板 ========== -->
        <div class="space-y-5">

          <!-- a) 预览卡片 -->

            <label class="text-sm font-medium text-on-surface mb-3 block">预览</label>
            <!-- 占位状态 -->

            <!-- 生成结果（默认隐藏） -->

                <div class="w-5 h-5 rounded-full bg-primary/10 flex items-center justify-center shrink-0 mt-0.5">
                  <span class="text-[10px] font-bold text-primary">2</span>
                </div>
                <p class="text-sm text-on-surface-variant leading-relaxed">可以指定风格、颜色、布局，如"极简风格、黑白配色、居中排版"</p>

              <li class="flex items-start gap-2.5">
                <div class="w-5 h-5 rounded-full bg-primary/10 flex items-center justify-center shrink-0 mt-0.5">
                  <span class="text-[10px] font-bold text-primary">3</span>
                </div>
                <p class="text-sm text-on-surface-variant leading-relaxed">使用参考图可以保持风格一致性，适合系列海报创作</p>
              </li>
            </ul>
          </div>

        </div>

      </div>
    </div>

  </main>
  <!-- @main-content:end -->

  <script>
    $(function() {
      // 初始化 Lucide 图标
      lucide.createIcons();

      // 显示当前日期
      const now = new Date();
      const dateStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
      $('#current-date').text(dateStr);

      // URL参数：预填描述文字
      const urlParams = new URLSearchParams(window.location.search);
      const promptParam = urlParams.get('prompt');
      if (promptParam) {
        $('#prompt-input').val(promptParam);
      }

      // ========== a) 模式切换器 ==========
      $('#tab-text2img').on('click', function() {
        $(this).addClass('bg-primary/15 text-primary ring-1 ring-primary/30').removeClass('text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high');
        $('#tab-ref2img').removeClass('bg-primary/15 text-primary ring-1 ring-primary/30').addClass('text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high');
        $('#ref-upload-section').addClass('hidden');
      });

      $('#tab-ref2img').on('click', function() {
        $(this).addClass('bg-primary/15 text-primary ring-1 ring-primary/30').removeClass('text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high');
        $('#tab-text2img').removeClass('bg-primary/15 text-primary ring-1 ring-primary/30').addClass('text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high');
        $('#ref-upload-section').removeClass('hidden');
      });

      // ========== b) 参考图上传 ==========
      // 上传区域点击 - 应实现文件选择对话框
      // 完整行为：1. 点击触发隐藏的 file input
      // 2. 用户选择文件后，读取文件为 Data URL
      // 3. 将 Data URL 设置为预览图片的 src
      // 4. 隐藏上传区域，显示预览区域
      // 5. 支持拖拽文件到上传区域，同样触发上述流程
      $('#ref-upload-area').on('click', function() {
        console.log('需要实现文件选择功能：创建隐藏 input[type=file]，accept="image/*"，监听 change 事件读取文件');
        // 模拟上传成功：显示预览
        $('#ref-upload-area').addClass('hidden');
        $('#ref-preview-area').removeClass('hidden');
        $('#ref-preview-img').attr('src', 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe');
        lucide.createIcons();
      });

      // 移除参考图
      $('#btn-remove-ref').on('click', function() {
        $('#ref-preview-area').addClass('hidden');
        $('#ref-upload-area').removeClass('hidden');
        $('#ref-preview-img').attr('src', '');
      });

      // ========== c) 清空描述 ==========
      $('#btn-clear-prompt').on('click', function() {
        $('#prompt-input').val('').focus();
      });

      // 快捷模板
      $('.template-btn').on('click', function() {
        const prompt = $(this).data('prompt');
        $('#prompt-input').val(prompt);
      });

      // ========== d) 图片比例选择 ==========
      $('.ratio-btn').on('click', function() {
        $('.ratio-btn').removeClass('bg-primary/15 text-primary ring-1 ring-primary/30').addClass('bg-surface-container text-on-surface-variant hover:bg-surface-container-high');
        $(this).removeClass('bg-surface-container text-on-surface-variant hover:bg-surface-container-high').addClass('bg-primary/15 text-primary ring-1 ring-primary/30');
      });

      // ========== d) 生成模型选择 ==========
      $('.model-option').on('click', function() {
        // 重置所有模型选项样式
        $('.model-option').removeClass('bg-primary/10 ring-1 ring-primary/30').addClass('bg-surface-container hover:bg-surface-container-high');
        // 隐藏所有 check 图标
        $('.model-check').addClass('hidden');
        // 所有 radio 边框恢复
        $('.model-option .w-5.h-5').removeClass('border-primary').addClass('border-outline-variant');
        // 设置当前选中样式
        $(this).removeClass('bg-surface-container hover:bg-surface-container-high').addClass('bg-primary/10 ring-1 ring-primary/30');
        $(this).find('.model-check').removeClass('hidden');
        $(this).find('.w-5.h-5').removeClass('border-outline-variant').addClass('border-primary');
      });

      // ========== e) 生成按钮 & f) 进度条 ==========
      let isGenerating = false;

      $('#btn-generate').on('click', function() {
        if (isGenerating) return;
        isGenerating = true;

        const promptVal = $('#prompt-input').val().trim();
        if (!promptVal) {
          $('#prompt-input').focus().attr('placeholder', '请先输入海报描述再生成');
          isGenerating = false;
          return;
        }

        // 显示进度条，隐藏预览结果
        $('#progress-section').removeClass('hidden');
        $('#preview-placeholder').addClass('hidden');
        $('#preview-result').addClass('hidden');

        // 按钮进入加载状态
        $('#btn-generate').html('<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>正在生成中...');
        $('#btn-generate').addClass('opacity-80 pointer-events-none');
        lucide.createIcons();

        // 模拟进度动画
        const statusTexts = [
          { percent: 15, text: '正在分析描述...' },
          { percent: 35, text: '正在构建画面...' },
          { percent: 60, text: '正在渲染细节...' },
          { percent: 85, text: '正在优化画质...' },
          { percent: 100, text: '生成完成！' }
        ];

        let step = 0;
        const progressInterval = setInterval(function() {
          if (step < statusTexts.length) {
            $('#progress-bar').css('width', statusTexts[step].percent + '%');
            $('#progress-percent').text(statusTexts[step].percent + '%');
            $('#progress-status').text(statusTexts[step].text);
            step++;
          } else {
            clearInterval(progressInterval);
            // 显示生成结果
            $('#preview-result').removeClass('hidden');
            $('#progress-section').addClass('hidden');

            // 恢复按钮状态
            $('#btn-generate').html('<i data-lucide="wand-2" class="w-5 h-5"></i>立即生成');
            $('#btn-generate').removeClass('opacity-80 pointer-events-none');
            lucide.createIcons();

            isGenerating = false;
          }
        }, 800);
      });

      // ========== 预览操作按钮 ==========
      // 下载按钮 - 应实现图片下载
      // 完整行为：1. 获取当前预览图片的 src
      // 2. 创建 <a> 标签，href 为图片 URL，download 属性设置文件名
      // 3. 触发 click 事件下载
      $('#btn-download').on('click', function() {
        console.log('需要实现图片下载功能：获取 result-image 的 src，创建 a[download] 触发下载');
      });

      // 复制链接按钮 - 应实现复制到剪贴板
      // 完整行为：1. 构造分享链接（包含生成参数）
      // 2. 使用 navigator.clipboard.writeText() 写入剪贴板
      // 3. 按钮文字临时变为"已复制"反馈
      $('#btn-copy-link').on('click', function() {
        console.log('需要实现复制链接功能：构造分享链接并写入剪贴板');
        // 简单反馈
        const $btn = $(this);
        const originalHtml = $btn.html();
        $btn.html('<i data-lucide="check" class="w-4 h-4"></i>已复制');
        lucide.createIcons();
        setTimeout(function() {
          $btn.html(originalHtml);
          lucide.createIcons();
        }, 1500);
      });

    });
  </script>

  <script>lucide.createIcons();</script>
</body>

</html>
