<head>

  <!-- 字体：使用 Google Fonts -->

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（电光紫科技感） === */
      --color-primary:              #A855F7;
      --color-primary-container:    #1E1B4B;
      --color-on-primary:           #ffffff;
      --color-accent:               #6366F1;
      /* === 背景 / 表面（暗色模式） === */
      --color-background:                 #0F172A;
      --color-surface-container-lowest:   #020617;
      --color-surface:                    #1E293B;
      --color-surface-container:          #334155;
      --color-surface-container-high:     #475569;
      --color-surface-container-highest:  #64748B;
      /* === 文字 === */
      --color-on-surface:           #F8FAFC;
      --color-on-surface-variant:   #CBD5E1;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #475569;
      --color-outline-variant:  #334155;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影（暗色背景，opacity 较高） === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.4);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.5);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.6);
      /* === 紫色发光阴影（用于 hover 效果） === */
      --shadow-glow-purple: 0 0 20px rgba(168, 85, 247, 0.3);
      /* === 字体 === */
      --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
    }
    
    /* 自定义样式：渐变文字、金属按钮效果等 */
    .gradient-text {
      background: linear-gradient(135deg, #A855F7 0%, #6366F1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .btn-metallic {
      background: linear-gradient(135deg, #94A3B8 0%, #CBD5E1 50%, #94A3B8 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 2px 4px rgba(0,0,0,0.3);
    }
    
    .btn-metallic:hover {
      background: linear-gradient(135deg, #CBD5E1 0%, #F8FAFC 50%, #CBD5E1 100%);
    }
    
    .card-glow:hover {
      box-shadow: var(--shadow-glow-purple);
      border-color: var(--color-primary);
    }
    
    /* 背景网格纹理 */
    .grid-bg {
      background-image: 
        linear-gradient(rgba(168, 85, 247, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168, 85, 247, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    
    /* Textarea 自动高度 */
    .textarea-auto {
      min-height: 200px;
      resize: none;
    }
    
    /* @mention 弹出层样式 */
    .mention-panel {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      margin-bottom: 8px;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

  <div id="generating-overlay" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
    <div class="bg-surface rounded-2xl shadow-dialog p-8 flex flex-col items-center gap-4">
      <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center animate-pulse">
        <i data-lucide="loader-2" class="w-8 h-8 text-primary animate-spin"></i>
      </div>
      <div class="text-center">
        <h4 class="text-lg font-semibold text-on-surface">正在生成海报...</h4>
        <p class="text-sm text-on-surface-variant mt-1">AI 正在创作中，请稍候</p>
      </div>

  <script>
    $(function() {
      // 初始化 Lucide 图标
      lucide.createIcons();
      
      // ==================== @mention 功能 ====================
      const $promptInput = $('#prompt-input');
      const $mentionPanel = $('#mention-panel');
      const $mentionSearch = $('#mention-search');
      const $mentionList = $('#mention-list');
      const $referencedAssets = $('#referenced-assets');
      
      // 监听输入，检测 @ 符号
      $promptInput.on('input', function() {
        const value = $(this).val();
        const cursorPos = this.selectionStart;
        
        // 查找当前光标前最近的 @ 符号
        const textBeforeCursor = value.substring(0, cursorPos);
        const lastAtIndex = textBeforeCursor.lastIndexOf('@');
        
        if (lastAtIndex !== -1) {
          // 检查 @ 后面是否有空格或换行（如果有则不显示面板）
          const textAfterAt = textBeforeCursor.substring(lastAtIndex + 1);
          if (!textAfterAt.includes(' ') && !textAfterAt.includes('\n')) {
            $mentionPanel.removeClass('hidden');
            $mentionSearch.val(textAfterAt).trigger('input');
            lucide.createIcons();
            return;
          }
        }
        
        $mentionPanel.addClass('hidden');
      });
      
      // 搜索过滤素材
      $mentionSearch.on('input', function() {
        const keyword = $(this).val().toLowerCase();
        $mentionList.find('.mention-item').each(function() {
          const name = $(this).data('name').toString().toLowerCase();
          const value = ($(this).data('value') || '').toString().toLowerCase();
          const isMatch = name.includes(keyword) || value.includes(keyword);
          $(this).toggle(isMatch);
        });
      });
      
      // 点击素材项
      $mentionList.on('click', '.mention-item', function() {
        const type = $(this).data('type');
        const name = $(this).data('name');
        const id = $(this).data('id');
        const value = $(this).data('value') || '';
        
        if (type === 'text') {
          // 文字素材：插入到提示词
          const currentValue = $promptInput.val();
          const cursorPos = $promptInput[0].selectionStart;
          const textBeforeCursor = currentValue.substring(0, cursorPos);
          const lastAtIndex = textBeforeCursor.lastIndexOf('@');
          
          const newText = currentValue.substring(0, lastAtIndex) + value + currentValue.substring(cursorPos);
          $promptInput.val(newText);
          
          // 添加引用标签
          addReferencedTag(name, value, 'text');
        } else if (type === 'image') {
          // 图片素材：添加到参考图区域
          addRefImage($(this).data('name'), 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&h=400&fit=crop');
        }
        
        $mentionPanel.addClass('hidden');
      });
      
      // 添加已引用素材标签
      function addReferencedTag(name, value, type) {
        const tagHtml = `
          <span class="inline-flex items-center gap-1 px-2 py-1 bg-${type === 'text' ? 'accent' : 'primary'}/10 text-${type === 'text' ? 'accent' : 'primary'} rounded-md text-xs">
            <i data-lucide="${type === 'text' ? 'type' : 'image'}" class="w-3 h-3"></i>
            ${name}
            <button class="btn-remove-tag ml-1 hover:opacity-70" data-type="${type}" data-name="${name}">×</button>
          </span>
        `;
        $referencedAssets.append(tagHtml);
        lucide.createIcons();
      }
      
      // 移除引用标签
      $referencedAssets.on('click', '.btn-remove-tag', function() {
        $(this).parent().remove();
      });
      
      // 点击其他区域关闭面板
      $(document).on('click', function(e) {
        if (!$(e.target).closest('#prompt-input, #mention-panel').length) {
          $mentionPanel.addClass('hidden');
        }
      });
      
      // ==================== Brand Kit 弹窗 ====================
      const $brandkitModal = $('#brandkit-modal');
      const $brandkitSearch = $('#brandkit-search');
      const $brandkitGrid = $('#brandkit-grid');
      
      // 打开 Brand Kit 弹窗
      $('#btn-brandkit, #add-ref-placeholder').on('click', function() {
        $brandkitModal.removeClass('hidden');
        lucide.createIcons();
      });
      
      // 关闭 Brand Kit 弹窗
      $('#btn-close-brandkit').on('click', function() {
        $brandkitModal.addClass('hidden');
      });
      
      // 点击遮罩关闭
      $brandkitModal.on('click', function(e) {
        if ($(e.target).is('#brandkit-modal')) {
          $(this).addClass('hidden');
        }
      });
      
      // 搜索过滤 Brand Kit 图片
      $brandkitSearch.on('input', function() {
        const keyword = $(this).val().toLowerCase();
        $brandkitGrid.find('.brandkit-image').each(function() {
          const name = $(this).data('name').toString().toLowerCase();
          $(this).toggle(name.includes(keyword));
        });
      });
      
      // 选择 Brand Kit 图片
      $brandkitGrid.on('click', '.brandkit-image', function() {
        const name = $(this).data('name');
        const url = $(this).data('url');
        addRefImage(name, url);
        $brandkitModal.addClass('hidden');
      });
      
      // ==================== 参考图管理 ====================
      let refImageCount = 3;
      
      // 添加参考图
      function addRefImage(name, url) {
        if (refImageCount >= 4) {
          alert('最多只能添加 4 张参考图');
          return;
        }
        
        const imageId = 'ref-' + Date.now();
        const imageHtml = `
          <div class="ref-image-item relative aspect-square bg-surface-container rounded-lg overflow-hidden group">
            <img src="${url}" alt="${name}" data-category="商业科技" class="w-full h-full object-cover" />
            <button class="btn-remove-ref absolute top-2 right-2 w-6 h-6 bg-error/80 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity" data-id="${imageId}">
              <i data-lucide="x" class="w-3.5 h-3.5 text-white"></i>
            </button>
          </div>
        `;
        
        $('#add-ref-placeholder').before(imageHtml);
        refImageCount++;
        lucide.createIcons();
        
        if (refImageCount >= 4) {
          $('#add-ref-placeholder').hide();
        }
      }
      
      // 删除参考图
      $('#ref-images-grid').on('click', '.btn-remove-ref', function(e) {
        e.stopPropagation();
        $(this).closest('.ref-image-item').remove();
        refImageCount--;
        $('#add-ref-placeholder').show();
      });
      
      // ==================== 上传按钮 ====================
      $('#btn-upload').on('click', function() {
        console.log('需要调用文件上传接口实现图片上传功能');
        // 上传成功后调用 addRefImage(name, url)
      });
      
      // ==================== 比例选择 ====================
      $('.ratio-btn').on('click', function() {
        $('.ratio-btn').removeClass('bg-primary/10 text-primary font-medium').addClass('bg-surface-container text-on-surface-variant');
        $(this).removeClass('bg-surface-container text-on-surface-variant').addClass('bg-primary/10 text-primary font-medium');
        $(this).attr('aria-pressed', 'true').siblings().attr('aria-pressed', 'false');
      });
      
      // ==================== 生成按钮 ====================
      $('#btn-generate').on('click', function() {
        const prompt = $promptInput.val().trim();
        if (!prompt) {
          alert('请输入提示词');
          return;
        }
        
        // 显示生成中状态
        $('#generating-overlay').removeClass('hidden');
        lucide.createIcons();
        
        // 模拟生成完成
        // 实际项目中应调用 AI 生成接口，生成完成后：
        // 1. 隐藏遮罩：$('#generating-overlay').addClass('hidden');
        // 2. 跳转到作品详情页或显示生成结果
        // 3. 扣除积分
        
        // 生成按钮点击后应实现：
        // 1. 收集提示词内容
        // 2. 收集参考图列表
        // 3. 收集选择的模型和比例
        // 4. 调用 AI 图像生成 API
        // 5. 显示生成进度/结果
        // 6. 生成完成后跳转或展示结果
        console.log('生成参数:', {
          prompt: prompt,
          model: $('#model-select').val(),
          ratio: $('.ratio-btn[aria-pressed="true"]').data('ratio'),
          refImages: refImageCount
        });
      });
    });
  </script>
