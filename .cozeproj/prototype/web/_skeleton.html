<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #22C55E;
      --color-primary-container:    #22C55E;
      --color-on-primary:           #050f09;
      /* === 背景 / 表面 === */
      --color-background:                 #09090b;
      --color-surface-container-lowest:   #111113;
      --color-surface:                    #09090b;
      --color-surface-container:          #1c1c1f;
      --color-surface-container-high:     #27272a;
      --color-surface-container-highest:  #303033;
      /* === 文字 === */
      --color-on-surface:           #fafafa;
      --color-on-surface-variant:   #a1a1aa;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #27272a;
      --color-outline-variant:  #3f3f46;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.12);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.25);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.4);
      /* === 字体 === */
      --font-sans: "Inter", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="bg-background/80 backdrop-blur-md sticky top-0 z-50 w-full border-b border-outline-variant/30">
    <div class="max-w-[1800px] mx-auto flex h-16 items-center px-4 md:px-6">
      <a href="home.html" class="mr-8 flex items-center space-x-2">
        <div class="bg-primary/15 rounded-lg p-1.5 ring-1 ring-primary/40">
          <i data-lucide="sparkles" class="h-4 w-4 text-primary"></i>
        </div>
        <span class="hidden font-bold sm:inline-block text-lg">SparkAI</span>
      </a>
      <nav class="flex items-center space-x-2 text-sm font-medium flex-1">
        <a href="home.html" class="flex items-center gap-2 px-4 py-2 rounded-full transition-all bg-primary/15 text-primary font-semibold ring-1 ring-primary/30" aria-current="page">
          <i data-lucide="home" class="h-4 w-4"></i>
          海报广场
        </a>
        <a href="create.html" class="flex items-center gap-2 px-4 py-2 rounded-full transition-all text-on-surface-variant hover:text-on-surface hover:bg-surface-container/60">
          <i data-lucide="plus" class="h-4 w-4"></i>
          创作中心
        </a>
      </nav>
      <div class="ml-auto flex items-center space-x-4">
        <button class="hover:text-primary p-2 rounded-full transition-colors text-on-surface-variant">
          <i data-lucide="compass" class="h-5 w-5"></i>
        </button>
        <a href="create.html" class="bg-primary text-on-primary hover:bg-primary/90 font-bold rounded-full px-6 py-2 text-sm shadow-[0_0_20px_rgba(34,197,94,0.15)] hover:shadow-[0_0_30px_rgba(34,197,94,0.3)] transition-all">
          开始创作
        </a>
      </div>
    </div>
  </header>
  <!-- @nav:end 导航组件 -->

  <main class="max-w-[1800px] mx-auto">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
