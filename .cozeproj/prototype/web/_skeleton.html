<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体：使用 Google Fonts -->
  <link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色（电光紫科技感） === */
      --color-primary:              #A855F7;
      --color-primary-container:    #1E1B4B;
      --color-on-primary:           #ffffff;
      --color-accent:               #6366F1;
      /* === 背景 / 表面（暗色模式） === */
      --color-background:                 #0F172A;
      --color-surface-container-lowest:   #020617;
      --color-surface:                    #1E293B;
      --color-surface-container:          #334155;
      --color-surface-container-high:     #475569;
      --color-surface-container-highest:  #64748B;
      /* === 文字 === */
      --color-on-surface:           #F8FAFC;
      --color-on-surface-variant:   #CBD5E1;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #475569;
      --color-outline-variant:  #334155;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影（暗色背景，opacity 较高） === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.4);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.5);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.6);
      /* === 紫色发光阴影（用于 hover 效果） === */
      --shadow-glow-purple: 0 0 20px rgba(168, 85, 247, 0.3);
      /* === 字体 === */
      --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
    }
    
    /* 自定义样式：渐变文字、金属按钮效果等 */
    .gradient-text {
      background: linear-gradient(135deg, #A855F7 0%, #6366F1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .btn-metallic {
      background: linear-gradient(135deg, #94A3B8 0%, #CBD5E1 50%, #94A3B8 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 2px 4px rgba(0,0,0,0.3);
    }
    
    .btn-metallic:hover {
      background: linear-gradient(135deg, #CBD5E1 0%, #F8FAFC 50%, #CBD5E1 100%);
    }
    
    .card-glow:hover {
      box-shadow: var(--shadow-glow-purple);
      border-color: var(--color-primary);
    }
    
    /* 背景网格纹理 */
    .grid-bg {
      background-image: 
        linear-gradient(rgba(168, 85, 247, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168, 85, 247, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans grid-bg min-h-screen">

  <!-- @nav:start 导航组件 -->
  <header class="sticky top-0 z-40 bg-surface/80 backdrop-blur-md border-b border-primary/20">

        <i data-lucide="sparkles" class="w-6 h-6 text-primary"></i>
        <span class="font-bold text-lg gradient-text">SparkAI</span>
      </div>
      <nav class="flex items-center gap-1">
        <a href="home.html" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">首页</a>
        <a href="create.html" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">创作中心</a>
        <a href="my-works.html" class="px-3 py-1.5 text-sm font-medium bg-primary/10 text-primary rounded-md transition-colors" aria-current="page">我的作品</a>
        <a href="stats.html" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:text-on-surface hover:bg-surface-container rounded-md transition-colors">数据统计</a>
      </nav>
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-on-primary font-medium text-sm">初</div>
      </div>
    </div>
  </header>
  <!-- @nav:end 导航组件 -->

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
