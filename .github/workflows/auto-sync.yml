name: Auto Sync Sub-sites

on:
  push:
    branches: [main]

jobs:
  sync-sub-sites:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get commit info
        id: commit
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "msg=$(git log -1 --pretty=format:%s)" >> "$GITHUB_OUTPUT"

